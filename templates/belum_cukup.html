<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Ruang Teduh</title>

<style>

body{

    margin:0;
    padding:0;

    font-family:Arial;

    background-image:
    url('/static/bg.png');

    background-size:cover;
    background-position:center;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{

    width:90%;
    max-width:700px;

    background:
    rgba(255,255,255,0.15);

    backdrop-filter:blur(8px);

    border-radius:30px;

    padding:40px;

    text-align:center;

    color:white;
}

h1{

    font-size:45px;

    text-shadow:
    2px 2px 10px black;
}

p{

    font-size:20px;

    line-height:1.8;
}

.coin{

    margin-top:20px;

    font-size:28px;

    color:#d8f3dc;
}

button{

    margin-top:30px;

    width:220px;
    height:55px;

    border:none;

    border-radius:20px;

    background:#52b788;

    color:white;

    font-size:18px;

    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>
💬 Ruang Teduh
</h1>

<p>

😭 Koin kamu belum cukup
untuk membuka ruang curhat.

</p>

<p>

Kumpulkan minimal
10 koin dari game dan latihan soal
untuk membuka akses curhat.

</p>

<div class="coin">

🪙 Koin Kamu:
{{ coins }}

</div>

<button
onclick="window.location.href='/siswa'">

Kembali

</button>

</div>

</body>
</html>
